services:
  - type: web
    name: baay-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: DATABASE_URL
        fromDatabase:
          name: baay-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WHATSAPP_API_TOKEN
        value: dummy
      - key: WHATSAPP_PHONE_NUMBER_ID
        value: dummy
      - key: WHATSAPP_VERIFY_TOKEN
        value: baay-reseau-verify
      - key: WAVE_API_KEY
        value: dummy
      - key: ORANGE_MONEY_API_KEY
        value: dummy
      - key: OPENAI_API_KEY
        value: dummy
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CLOUDINARY_CLOUD_NAME
        value: dxzpdbips
      - key: CLOUDINARY_API_KEY
        value: "172438666353219"
      - key: CLOUDINARY_API_SECRET
        value: VOCO4-nCzGd2PFLqh94tUjL14kk
      - key: CORS_ORIGINS
        value: '["*"]'
      - key: GOOGLE_CLIENT_ID
        value: 251752897480-282rr72tgk359cnddnlle66ok4i750m9.apps.googleusercontent.com
      - key: FCM_SERVER_KEY
        value: 0Rm5F7m7_pSVdJZGNEx64Z8icuOZuezVthcmGAGQi44
      - key: FCM_PROJECT_ID
        value: baay-reseau-5747e

  - type: web
    name: baay-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: baay-backend
          property: host
      - key: NEXT_PUBLIC_GOOGLE_CLIENT_ID
        value: 251752897480-282rr72tgk359cnddnlle66ok4i750m9.apps.googleusercontent.com
      - key: NEXT_PUBLIC_VAPID_PUBLIC_KEY
        value: BL7T0E8wzw9pvoHbWyC8qCjVrdTA-I05DGkDks0byARy3CP7Sv8rIPyDT9Q5QcLmHUFQ6lBzVrYFyufd2ERbrlw

